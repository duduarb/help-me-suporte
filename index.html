<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Wiki Suporte Consumo - Intelbras</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/wiki.png">
</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho-esquerda">
            <h1 onclick="window.location.reload()" style="cursor: pointer;">Wiki Suporte Consumo</h1>
        </div>
        
        <div class="cabecalho-centro">
            <input type="text" class="barra-pesquisa" id="inputPesquisa" placeholder="Pesquisar em toda wiki...">
        </div>
        
        <div class="cabecalho-direita">
            <button class="botao-tema" id="botaoTema" aria-label="Alternar modo claro/escuro">
                <span class="icone-tema">☀️</span>
            </button>
        </div>
    </header>

    <main class="conteudo-principal">
        <div id="resultadosPesquisa" class="resultados-pesquisa" style="display: none;"></div>
        
        <div class="segmentos-container" id="segmentosContainer"></div>
        
        <div id="containerAdicionarLateral" style="display: none; justify-content: center; margin-top: 20px;">
            <button onclick="abrirModalAdicionar()" class="btn-adicionar-novo" style="background: var(--verde-intelbras); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 10px;">
                <span>➕</span> Adicionar Novo Conteúdo
            </button>
        </div>
    </main>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <p>Desenvolvido por Anderson Eduardo Bento</p>
            <div class="rodape-links">
                <a href="https://github.com/duduarb" target="_blank" title="GitHub" class="rodape-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <a href="https://www.linkedin.com/in/anderson-eduardo-bento/" target="_blank" title="LinkedIn" class="rodape-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <button onclick="gerenciarPainelAdmin()" style="position: fixed; bottom: 10px; right: 10px; opacity: 0.3; border: none; background: none; cursor: pointer; font-size: 20px; z-index: 1001;">⚙️</button>

    <div id="modalLogin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:8px; width:90%; max-width:400px; color: #333; text-align: center;">
            <h3 style="margin-bottom: 20px;">Acesso Administrativo</h3>
            <input type="email" id="loginEmail" placeholder="E-mail" style="width:100%; margin-bottom:10px; padding:12px; border: 1px solid #ddd; border-radius: 4px;">
            <input type="password" id="loginSenha" placeholder="Senha" style="width:100%; margin-bottom:20px; padding:12px; border: 1px solid #ddd; border-radius: 4px;">
            <button onclick="realizarLogin()" style="background:#00a859; color:white; border:none; padding:12px 20px; border-radius:4px; cursor:pointer; width: 100%; font-weight: bold; margin-bottom: 10px;">Entrar</button>
            <button onclick="fecharModais()" style="background:none; color:#666; border:none; cursor:pointer; font-size: 14px;">Cancelar</button>
        </div>
    </div>

    <div id="modalOpcoesAdmin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9998; justify-content:center; align-items:center;">
        <div style="background:white; padding:25px; border-radius:8px; width:90%; max-width:400px; color: #333; text-align: center;">
            <h3 style="margin-bottom: 20px;">Painel de Controle</h3>
            <button onclick="realizarLogout()" style="background:#d9534f; color:white; border:none; padding:12px 20px; border-radius:4px; cursor:pointer; width: 100%;">🚪 Sair (Logout)</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <button onclick="fecharModais()" style="background:none; color:#666; border:none; cursor:pointer;">Fechar</button>
        </div>
    </div>

    <div id="modalAdmin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:90%; max-width:500px; color: #333;">
            <h3>Novo Conteúdo</h3><br>
            <label style="font-size: 12px; font-weight: bold;">1. Escolha o Segmento:</label>
            <select id="selectSegmento" style="width:100%; margin-bottom:10px; padding:8px;" onchange="ajustarInputsDinamicos('segmento')">
                <option value="">Selecione...</option>
                <option value="novo">+ Criar Novo Segmento</option>
            </select>
            <input type="text" id="addSegmentoNovo" placeholder="Nome do novo Segmento" style="display:none; width:100%; margin-bottom:10px; padding:8px; border: 1px solid var(--verde-intelbras);">

            <label style="font-size: 12px; font-weight: bold;">2. Escolha o Tópico:</label>
            <select id="selectTopico" style="width:100%; margin-bottom:10px; padding:8px;" onchange="ajustarInputsDinamicos('topico')">
                <option value="">Selecione um segmento primeiro...</option>
            </select>
            <input type="text" id="addTopicoNovo" placeholder="Nome do novo Tópico" style="display:none; width:100%; margin-bottom:10px; padding:8px; border: 1px solid var(--verde-intelbras);">

            <label style="font-size: 12px; font-weight: bold;">3. Subtópico e Texto:</label>
            <input type="text" id="addSubtopico" placeholder="Subtópico (ex: Instalação) - Opcional" style="width:100%; margin-bottom:10px; padding:8px;">
            <textarea id="addTexto" placeholder="Texto do conteúdo (pode usar <br>)" style="width:100%; height:100px; margin-bottom:10px; padding:8px;"></textarea>
            <button onclick="salvarNoBanco()" style="background:#00a859; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">Salvar na Nuvem</button>
            <button onclick="fecharModais()" style="background:#666; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; margin-left:10px;">Cancelar</button>
        </div>
    </div>

    <div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:90%; max-width:500px; color: #333;">
            <h3>Editar Tudo</h3><br>
            <input type="hidden" id="editId">
            <label style="font-size: 11px; font-weight: bold;">Mover para Segmento:</label>
            <select id="editSelectSegmento" style="width:100%; margin-bottom:10px; padding:8px;" onchange="ajustarInputsEdicao('segmento')"></select>
            <input type="text" id="editSegmentoNovo" placeholder="Novo nome para este Segmento" style="display:none; width:100%; margin-bottom:10px; padding:8px; border: 1px solid #00a859;">
            <label style="font-size: 11px; font-weight: bold;">Mover para Tópico:</label>
            <select id="editSelectTopico" style="width:100%; margin-bottom:10px; padding:8px;" onchange="ajustarInputsEdicao('topico')"></select>
            <input type="text" id="editTopicoNovo" placeholder="Novo nome para este Tópico" style="display:none; width:100%; margin-bottom:10px; padding:8px; border: 1px solid #00a859;">
            <label style="font-size: 11px; font-weight: bold;">Subtópico:</label>
            <input type="text" id="editSubtopico" style="width:100%; margin-bottom:10px; padding:8px;">
            <label style="font-size: 11px; font-weight: bold;">Conteúdo:</label>
            <textarea id="editTexto" style="width:100%; height:120px; margin-bottom:10px; padding:8px;"></textarea>
            <button onclick="confirmarEdicao()" style="background:#00a859; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">Salvar Alterações</button>
            <button onclick="fecharModais()" style="background:#666; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; margin-left:10px;">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/script.js"></script>
</body>
</html>
